services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - C:\dev\BeaBeaCallMe\gdrive-credentials.json:/app/secrets/gdrive-credentials.json:ro
    env_file:
      - .env

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
