name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  bandit-ruff:
    name: Python SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install bandit ruff

      - name: Bandit SAST
        run: |
          bandit -r app/ config.py run.py \
            --format txt \
            --severity-level medium \
            --confidence-level medium

      - name: Ruff lint
        run: ruff check app/ config.py run.py

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog — scan git history
        uses: trufflesecurity/trufflehog@v3.95.6
        with:
          extra_args: --only-verified

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008  # apt pin versions — not applicable (no apt in this Dockerfile)

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t beabeacallme:ci .

      - name: Grype container scan
        uses: anchore/scan-action@v6
        with:
          image: beabeacallme:ci
          fail-build: true
          severity-cutoff: high
          output-format: table
